# Application configuration converted from application.properties to YAML
spring:
  application:
    name: discovery-server

server:
  port: 8761

# Eureka server configuration (self-contained server; does not try to register itself)
eureka:
  client:
    register-with-eureka: false
    fetch-registry: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

# Application configuration converted from application.properties to YAML
server:
  port: 8081

spring:
  application:
    name: restaurant-service
  config:
    import: optional:configserver:http://localhost:8888

  # Database Configuration
  datasource:
    url: jdbc:h2:mem:restaurant_db
    driverClassName: org.h2.Driver
    username: sa
    password: password

  # H2 Console Configuration
  h2:
    console:
      enabled: true
      path: /h2-console

  # JPA Configuration
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Eureka Client
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    fetch-registry: true
    register-with-eureka: true

# Logging Configuration
logging:
  level:
    com.food_delivery_platform.restaurant_service: DEBUG
    org.springframework.web: DEBUG

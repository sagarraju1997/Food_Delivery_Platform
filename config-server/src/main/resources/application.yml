server:
  port: 8888

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/shared-config, file:../shared-config
      label: main
  profiles:
    active: native

# Register with Eureka discovery
# Change host for discovery server if needed
EUREKA_URI: http://localhost:8761/eureka

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI}
    register-with-eureka: true
    fetch-registry: true

spring:
  application:
    name: function-service
  config:
    import: optional:configserver:http://localhost:8888

server:
  port: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info

---
# Default local fallback if config-server is not available
spring:
  datasource:
    url: jdbc:h2:mem:functiondb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: ''
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  cloud:
    discovery:
      enabled: true

logging:
  level:
    root: INFO
